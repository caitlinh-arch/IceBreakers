<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icebreaker Responses — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f0; --surface: #fff; --border: #e4e0d8;
      --accent: #4f46e5; --text: #1a1825; --muted: #6b6680;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; padding:2.5rem 1rem; }
    .page { max-width: 700px; margin: 0 auto; }
    .header { margin-bottom: 2.5rem; }
    .eyebrow { font-size:.72rem; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:.5rem; }
    h1 { font-family:'Syne',sans-serif; font-size:clamp(1.8rem,4vw,2.4rem); font-weight:800; line-height:1.1; margin-bottom:.4rem; }
    .subtitle { color:var(--muted); font-size:.9rem; }

    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: .75rem;
      margin-bottom: 1.5rem;
    }
    .count-badge {
      background: var(--accent); color: #fff;
      font-size: .75rem; font-weight: 600;
      padding: .3em .85em; border-radius: 100px;
    }
    .btn-clear {
      background: transparent; border: 1px solid #fca5a5;
      color: #dc2626; font-family:'Inter',sans-serif;
      font-size: .8rem; font-weight: 600; padding: .45em 1em;
      border-radius: 8px; cursor: pointer; transition: background .15s;
    }
    .btn-clear:hover { background: #fef2f2; }

    /* FILTER TABS */
    .filters { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .filter-btn {
      font-family:'Inter',sans-serif; font-size:.78rem; font-weight:600;
      padding:.4em 1em; border-radius:100px; border:1px solid var(--border);
      background:var(--surface); color:var(--muted); cursor:pointer; transition:all .15s;
    }
    .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* RESPONSE CARDS */
    .response-card {
      background: var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:1.5rem; margin-bottom:1rem;
      box-shadow:0 1px 6px rgba(0,0,0,.04);
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; } }

    .card-meta {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:.5rem; margin-bottom:1rem;
    }
    .name-badge {
      font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; color:var(--text);
    }
    .time-tag { font-size:.75rem; color:var(--muted); }
    .cat-pill {
      font-size:.68rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
      padding:.25em .75em; border-radius:100px;
      background:#ede9fe; color:var(--accent);
    }
    .q-row { font-size:.82rem; color:var(--muted); margin-bottom:.5rem; font-style:italic; }
    .answer-text { font-size:.95rem; line-height:1.65; color:var(--text); }

    /* EMPTY STATE */
    .empty { text-align:center; padding:4rem 1rem; }
    .empty .icon { font-size:2.5rem; margin-bottom:1rem; }
    .empty h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.2rem; margin-bottom:.4rem; }
    .empty p { color:var(--muted); font-size:.9rem; }

    .loading { text-align:center; padding:3rem; color:var(--muted); font-size:.9rem; }

    /* GROUP HEADER */
    .group-header {
      font-size:.72rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase;
      color:var(--muted); margin:2rem 0 .75rem;
      padding-bottom:.4rem; border-bottom:1px solid var(--border);
    }
    .group-header:first-child { margin-top:0; }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <p class="eyebrow">Admin View</p>
    <h1>Icebreaker Responses</h1>
    <p class="subtitle">All submissions from your team, grouped by question.</p>
  </div>

  <div class="toolbar">
    <span class="count-badge" id="countBadge">0 responses</span>
    <button class="btn-clear" onclick="clearAll()">Clear all responses</button>
  </div>

  <div class="filters" id="filters"></div>

  <div id="content"><p class="loading">Loading responses…</p></div>
</div>

<script>
  let allResponses = [];
  let activeFilter = 'All';

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
      + ' · ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  }

  function buildFilters() {
    const questions = [...new Set(allResponses.map(r => r.question))];
    const filtersEl = document.getElementById('filters');
    const all = ['All', ...questions];
    filtersEl.innerHTML = all.map(q => {
      const label = q === 'All' ? 'All' : q.length > 40 ? q.slice(0,40)+'…' : q;
      return `<button class="filter-btn ${q === activeFilter ? 'active' : ''}" onclick="setFilter(${JSON.stringify(q)})">${label}</button>`;
    }).join('');
  }

  function setFilter(q) {
    activeFilter = q;
    render();
  }

  function render() {
    const filtered = activeFilter === 'All'
      ? allResponses
      : allResponses.filter(r => r.question === activeFilter);

    // Update count
    document.getElementById('countBadge').textContent =
      `${filtered.length} response${filtered.length !== 1 ? 's' : ''}`;

    // Rebuild filters
    buildFilters();

    const content = document.getElementById('content');

    if (filtered.length === 0) {
      content.innerHTML = `
        <div class="empty">
          <div class="icon">💬</div>
          <h3>No responses yet</h3>
          <p>Share the employee page and responses will appear here.</p>
        </div>`;
      return;
    }

    // Group by question
    const groups = {};
    filtered.forEach(r => {
      if (!groups[r.question]) groups[r.question] = [];
      groups[r.question].push(r);
    });

    content.innerHTML = Object.entries(groups).map(([question, items]) => `
      <div class="group-header">${question}</div>
      ${items.sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp)).map(r => `
        <div class="response-card">
          <div class="card-meta">
            <span class="name-badge">${r.name}</span>
            <span class="cat-pill">${r.category || ''}</span>
            <span class="time-tag">${formatTime(r.timestamp)}</span>
          </div>
          <p class="answer-text">${r.answer.replace(/</g,'&lt;')}</p>
        </div>
      `).join('')}
    `).join('');
  }

  async function load() {
    try {
      const result = await window.storage.get('icebreaker-responses', true);
      allResponses = result ? JSON.parse(result.value) : [];
    } catch(e) {
      allResponses = [];
    }
    render();
  }

  async function clearAll() {
    if (!confirm('Delete all responses? This cannot be undone.')) return;
    await window.storage.delete('icebreaker-responses', true);
    allResponses = [];
    activeFilter = 'All';
    render();
  }

  load();
  // Auto-refresh every 30 seconds
  setInterval(load, 30000);
</script>
</body>
</html>
