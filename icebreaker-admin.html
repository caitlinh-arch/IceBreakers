<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icebreaker Responses — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f0; --surface: #fff; --border: #e4e0d8;
      --accent: #4f46e5; --text: #1a1825; --muted: #6b6680;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; padding:2.5rem 1rem; }
    .page { max-width:700px; margin:0 auto; }
    .header { margin-bottom:2rem; }
    .eyebrow { font-size:.72rem; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:.5rem; }
    h1 { font-family:'Syne',sans-serif; font-size:clamp(1.8rem,4vw,2.4rem); font-weight:800; line-height:1.1; margin-bottom:.4rem; }
    .subtitle { color:var(--muted); font-size:.9rem; }
    .toolbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.75rem; margin-bottom:1.5rem; }
    .count-badge { background:var(--accent); color:#fff; font-size:.75rem; font-weight:600; padding:.3em .85em; border-radius:100px; }
    .btn-refresh { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Inter',sans-serif; font-size:.8rem; font-weight:600; padding:.45em 1em; border-radius:8px; cursor:pointer; transition:all .15s; }
    .btn-refresh:hover { color:var(--text); border-color:var(--muted); }
    .btn-export { background:var(--accent); border:none; color:#fff; font-family:'Inter',sans-serif; font-size:.8rem; font-weight:600; padding:.45em 1em; border-radius:8px; cursor:pointer; transition:background .15s; }
    .btn-export:hover { background:#4338ca; }
    .filters { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .filter-btn { font-family:'Inter',sans-serif; font-size:.78rem; font-weight:600; padding:.4em 1em; border-radius:100px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; transition:all .15s; }
    .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .response-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.5rem; margin-bottom:1rem; box-shadow:0 1px 6px rgba(0,0,0,.04); animation:fadeUp .3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1} }
    .card-meta { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem; margin-bottom:.75rem; }
    .name-badge { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
    .time-tag { font-size:.75rem; color:var(--muted); }
    .cat-pill { font-size:.68rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:.25em .75em; border-radius:100px; background:#ede9fe; color:var(--accent); }
    .answer-text { font-size:.95rem; line-height:1.65; }
    .group-header { font-size:.72rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:2rem 0 .75rem; padding-bottom:.4rem; border-bottom:1px solid var(--border); }
    .group-header:first-child { margin-top:0; }
    .empty { text-align:center; padding:4rem 1rem; }
    .empty .icon { font-size:2.5rem; margin-bottom:1rem; }
    .empty h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.2rem; margin-bottom:.4rem; }
    .empty p { color:var(--muted); font-size:.9rem; line-height:1.6; }
    .loading { text-align:center; padding:3rem; color:var(--muted); font-size:.9rem; }
    .error-banner { background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:1rem 1.25rem; color:#dc2626; font-size:.875rem; margin-bottom:1.5rem; display:none; }
    .error-banner.show { display:block; }
    .last-updated { font-size:.75rem; color:var(--muted); margin-left:auto; }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <p class="eyebrow">Admin View</p>
    <h1>Icebreaker Responses</h1>
    <p class="subtitle">All submissions from your team, grouped by question.</p>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="toolbar">
    <span class="count-badge" id="countBadge">Loading…</span>
    <div style="display:flex;gap:.5rem;align-items:center;">
      <span class="last-updated" id="lastUpdated"></span>
      <button class="btn-refresh" onclick="load()">↻ Refresh</button>
      <button class="btn-export" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div id="content"><p class="loading">Loading responses…</p></div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/a/macros/salt.security/s/AKfycbwfaUTH_hhptM3TH2BcnklkDzjFqXJ2_Y9ljOVQmsk8uxYaa__TwT9OtLxrXCyjC3q5lQ/exec';

  let allResponses = [];
  let activeFilter = 'All';

  function formatTime(val) {
    if (!val) return '—';
    const d = new Date(val);
    if (isNaN(d)) return val;
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
      + ' · ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  }

  function buildFilters() {
    const questions = [...new Set(allResponses.map(r => r.Question || r.question || ''))].filter(Boolean);
    const filtersEl = document.getElementById('filters');
    if (questions.length <= 1) { filtersEl.innerHTML = ''; return; }
    const all = ['All', ...questions];
    filtersEl.innerHTML = all.map(q => {
      const label = q === 'All' ? 'All' : (q.length > 42 ? q.slice(0,42)+'…' : q);
      return `<button class="filter-btn ${q === activeFilter ? 'active' : ''}" onclick="setFilter(${JSON.stringify(q)})">${label}</button>`;
    }).join('');
  }

  function setFilter(q) { activeFilter = q; render(); }

  function render() {
    const filtered = activeFilter === 'All'
      ? allResponses
      : allResponses.filter(r => (r.Question || r.question) === activeFilter);

    document.getElementById('countBadge').textContent =
      `${filtered.length} response${filtered.length !== 1 ? 's' : ''}`;
    buildFilters();

    const content = document.getElementById('content');
    if (filtered.length === 0) {
      content.innerHTML = `<div class="empty"><div class="icon">💬</div><h3>No responses yet</h3><p>Share the employee page and responses will appear here.<br>Hit Refresh to check for new submissions.</p></div>`;
      return;
    }

    // Group by question
    const groups = {};
    filtered.forEach(r => {
      const q = r.Question || r.question || 'Uncategorized';
      if (!groups[q]) groups[q] = [];
      groups[q].push(r);
    });

    content.innerHTML = Object.entries(groups).map(([question, items]) => `
      <div class="group-header">${question}</div>
      ${items.sort((a,b) => new Date(b.Timestamp||b.timestamp) - new Date(a.Timestamp||a.timestamp)).map(r => `
        <div class="response-card">
          <div class="card-meta">
            <span class="name-badge">${(r.Name||r.name||'Anonymous').replace(/</g,'&lt;')}</span>
            <span class="cat-pill">${(r.Category||r.category||'').replace(/</g,'&lt;')}</span>
            <span class="time-tag">${formatTime(r.Timestamp||r.timestamp)}</span>
          </div>
          <p class="answer-text">${(r.Answer||r.answer||'').replace(/</g,'&lt;')}</p>
        </div>
      `).join('')}
    `).join('');
  }

  async function load() {
    const errorBanner = document.getElementById('errorBanner');
    errorBanner.classList.remove('show');
    document.getElementById('content').innerHTML = '<p class="loading">Loading responses…</p>';
    document.getElementById('countBadge').textContent = 'Loading…';

    try {
      const res = await fetch(SCRIPT_URL);
      const data = await res.json();
      allResponses = Array.isArray(data) ? data : [];
      document.getElementById('lastUpdated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      render();
    } catch(err) {
      document.getElementById('countBadge').textContent = '—';
      errorBanner.textContent = 'Could not load responses. Make sure the Apps Script is deployed and accessible, then try refreshing.';
      errorBanner.classList.add('show');
      document.getElementById('content').innerHTML = '';
    }
  }

  function exportCSV() {
    if (!allResponses.length) return alert('No responses to export.');
    const headers = ['Timestamp','Name','Question','Category','Answer'];
    const rows = allResponses.map(r => [
      r.Timestamp||r.timestamp||'',
      r.Name||r.name||'',
      r.Question||r.question||'',
      r.Category||r.category||'',
      r.Answer||r.answer||''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'icebreaker-responses.csv';
    a.click();
  }

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
